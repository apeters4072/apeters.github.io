<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title id="page-title">Project</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- ArcGIS Online embed support -->
  <script type="module"
    src="https://js.arcgis.com/embeddable-components/4.33/arcgis-embeddable-components.esm.js">
  </script>

  <link rel="stylesheet" href="../styles.css" />

  <style>
    /* =========================
       PAGE BACKGROUND
    ========================== */
    body {
      background: #f6f8fc;
    }

    /* =========================
       HERO
    ========================== */
    .project-hero {
      background:
        radial-gradient(80% 60% at 50% 0%, rgba(13,110,253,.10), transparent),
        linear-gradient(180deg, rgba(13,110,253,.05), transparent);
      border-radius: 1.25rem;
    }

    .img-caption {
      font-size: .9rem;
      color: #6c757d;
    }

    /* =========================
       LAYOUT
    ========================== */
    .project-body {
      max-width: 900px;
      margin: 0 auto;
    }

    .section-block {
      padding: 2.5rem 0;
      border-top: 1px solid #e3eaf4;
    }

    .section-block:first-of-type {
      border-top: none;
    }

    .section-title {
      font-weight: 700;
      margin-bottom: 1rem;
    }

    /* =========================
       META CARDS
    ========================== */
    .meta-card {
      padding: 1rem 1.25rem;
      border-radius: .75rem;
      background: #fff;
      border: 1px solid #e3eaf4;
    }

    /* =========================
       GALLERY STYLING
    ========================== */
    .gallery-card {
      background: #fff;
      border-radius: 14px;
      padding: 0.6rem;
      border: 1px solid #e3eaf4;
      box-shadow: 0 6px 18px rgba(0,0,0,.06);
      transition: transform .2s ease, box-shadow .2s ease;
    }

    .gallery-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 26px rgba(0,0,0,.12);
    }

    .gallery-card img {
      width: 100%;
      border-radius: 10px;
      display: block;
      background: #f8f9fa;
      cursor: zoom-in;
    }

    /* =========================
       LIGHTBOX MODAL
    ========================== */
    .modal-dark {
      background: rgba(0,0,0,.9);
    }

  </style>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
  <div class="container">
    <a class="navbar-brand" href="../index.html">Andrew Peters</a>

    <div class="ms-auto small">
      <a href="../index.html#projects" class="text-decoration-none">
        <i class="bi bi-arrow-left-short"></i> Back to Projects
      </a>
    </div>
  </div>
</nav>

<main class="container my-5">

  <!-- ================= HERO ================= -->
  <header class="project-hero p-4 p-md-5 shadow-sm mb-5">

    <div class="row g-4 align-items-center">

      <div class="col-lg-7">
        <h1 id="project-title" class="display-5 fw-semibold mb-3"></h1>
        <p id="project-description" class="lead mb-3"></p>
        <div id="project-tags" class="d-flex flex-wrap gap-2"></div>
      </div>

      <div class="col-lg-5">
        <figure class="mb-0">

          <div id="hero-container"></div>

          <figcaption id="hero-caption" class="img-caption mt-2"></figcaption>

        </figure>
      </div>

    </div>
  </header>

  <!-- ================= BODY ================= -->
  <div class="project-body">

    <!-- SUMMARY -->
    <section id="summary-section" class="section-block">
      <h2 class="section-title">Summary</h2>

      <p id="summary-text"></p>

      <div class="row g-3 mt-3">
        <div class="col-md-4">
          <div class="meta-card">
            <div class="text-muted small">Time</div>
            <div id="meta-time"></div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="meta-card">
            <div class="text-muted small">Role</div>
            <div id="meta-role"></div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="meta-card">
            <div class="text-muted small">Deliverables</div>
            <div id="meta-deliverable"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- OBJECTIVE -->
    <section id="objective-section" class="section-block">
      <h2 class="section-title">Objective</h2>
      <p id="objective-text"></p>
    </section>

    <!-- LINKS -->
    <section id="links-section" class="section-block">
      <h2 class="section-title">Links</h2>
      <ul id="links-list"></ul>
    </section>

    <!-- GALLERY -->
    <section id="gallery-section" class="section-block">
      <h2 class="section-title">Gallery</h2>
      <div id="gallery-grid" class="row g-3"></div>
    </section>

    <!-- METHODS -->
    <section id="method-section" class="section-block">
      <h2 class="section-title">Methods</h2>
      <ol id="method-list"></ol>
    </section>

    <!-- SOURCES -->
    <section id="sources-section" class="section-block pb-0">
      <h2 class="section-title">Sources</h2>
      <ul id="sources-list"></ul>
    </section>

  </div>
</main>

<!-- ================= LIGHTBOX MODAL ================= -->
<div class="modal fade" id="galleryModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-xl">
    <div class="modal-content modal-dark border-0">

      <div class="modal-header border-0">
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body text-center">
        <img src="" class="img-fluid modal-img mb-2" alt="">
        <div class="text-white small modal-caption"></div>
      </div>

    </div>
  </div>
</div>

<!-- ================= DATA ================= -->
<script src="../projects.js"></script>

<!-- ================= RENDER ENGINE ================= -->
<script>
document.getElementById("year")?.remove();

/* LOAD PROJECT */
const params = new URLSearchParams(window.location.search);
const projectId = params.get("id");
const project = projects.find(p => p.id === projectId);

if (!project) {
  document.body.innerHTML = "<div class='container py-5 text-center'><h1>Project Not Found</h1></div>";
  throw new Error("Project not found");
}

/* TITLE */
document.title = `${project.title} | Andrew Peters`;

document.getElementById("project-title").textContent = project.title;
document.getElementById("project-description").textContent = project.description;

/* TAGS */
document.getElementById("project-tags").innerHTML =
  (project.tags || []).map(t => `<span class="badge text-bg-light border">${t}</span>`).join("");

/* HERO (ArcGIS supported) */
const heroContainer = document.getElementById("hero-container");

if (project.hero?.type === "arcgis") {
  heroContainer.innerHTML = `
    <arcgis-embedded-map item-id="${project.hero.itemId}" theme="light"></arcgis-embedded-map>
  `;
} else {
  heroContainer.innerHTML = `
    <img src="../${project.hero.src}" class="img-fluid rounded" alt="${project.title}">
  `;
}

document.getElementById("hero-caption").textContent =
  project.hero?.caption || "";

/* SUMMARY */
if (project.summary) {
  document.getElementById("summary-text").textContent = project.summary;
  document.getElementById("meta-time").textContent = project.time || "N/A";
  document.getElementById("meta-role").textContent = project.role || "N/A";
  document.getElementById("meta-deliverable").textContent = project.deliverable || "N/A";
} else {
  document.getElementById("summary-section").style.display = "none";
}

/* OBJECTIVE */
if (project.objective) {
  document.getElementById("objective-text").textContent = project.objective;
} else {
  document.getElementById("objective-section").style.display = "none";
}

/* LINKS */
document.getElementById("links-list").innerHTML =
  (project.links || []).map(l =>
    `<li><a href="${l.url}" target="_blank">${l.label}</a></li>`
  ).join("") +
  (project.githubLink
    ? `<li><a href="${project.githubLink}" target="_blank">GitHub</a></li>`
    : "");

/* METHODS */
if (project.method?.length) {
  document.getElementById("method-list").innerHTML =
    project.method.map(m => `<li>${m}</li>`).join("");
} else {
  document.getElementById("method-section").style.display = "none";
}

/* SOURCES */
if (project.sources?.length) {
  document.getElementById("sources-list").innerHTML =
    project.sources.map(s => `<li>${s}</li>`).join("");
} else {
  document.getElementById("sources-section").style.display = "none";
}

/* GALLERY (odd-first full width + framing + lightbox support) */
if (project.gallery?.length) {

  const items = project.gallery;
  let html = "";

  items.forEach((img, i) => {
    const full = (items.length % 2 === 1 && i === 0);

    html += `
      <div class="${full ? "col-12" : "col-12 col-md-6"}">
        <figure class="gallery-card">
          <img src="../${img.src}" alt="${img.caption}">
          <figcaption class="img-caption mt-2">${img.caption}</figcaption>
        </figure>
      </div>
    `;
  });

  document.getElementById("gallery-grid").innerHTML = html;

  /* LIGHTBOX */
  const modalEl = document.getElementById("galleryModal");
  const modalImg = modalEl.querySelector(".modal-img");
  const modalCaption = modalEl.querySelector(".modal-caption");
  const modal = new bootstrap.Modal(modalEl);

  document.querySelectorAll("#gallery-grid img").forEach(img => {
    img.addEventListener("click", () => {
      modalImg.src = img.src;
      modalCaption.textContent =
        img.closest("figure")?.querySelector("figcaption")?.textContent || "";
      modal.show();
    });
  });

} else {
  document.getElementById("gallery-section").style.display = "none";
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
