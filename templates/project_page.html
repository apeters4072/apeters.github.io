<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="page-title">Project</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <script type="module" src="https://js.arcgis.com/embeddable-components/4.33/arcgis-embeddable-components.esm.js"></script>

  <link rel="stylesheet" href="../styles.css" />

  <style>
    body {
      background: #ffffff;
    }

    /* HERO (NO FRAME) */
    .project-hero{
      background:
        radial-gradient(80% 60% at 50% 0%, rgba(13,110,253,.08), transparent),
        linear-gradient(180deg, rgba(0,0,0,.03), transparent);
      border-radius: 1.25rem;
    }

    /* remove hero frame entirely */
    .map-hero {
      border-radius: 0;
      overflow: visible;
      box-shadow: none;
      background: transparent;
    }

    /* HERO IMAGE ONLY (no container styling) */
    .hero-media img,
    .hero-media arcgis-embedded-map {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 0.75rem;
    }

    /* caption BELOW image only */
    .hero-caption {
      font-size: .9rem;
      color: #6c757d;
      margin-top: .5rem;
    }

    /* CENTER BODY */
    .project-body {
      max-width: 900px;
      margin: 0 auto;
    }

    .section-block {
      padding: 2.5rem 0;
      border-top: 1px solid #e9eef5;
    }

    /* REMOVE "BUBBLE" HEADER FEEL */
    .section-title {
      font-weight: 600;
      margin-bottom: 0.75rem;
      font-size: 1.4rem;
      padding: 0;
      border: none;
      background: none;
    }

    /* METADATA */
    .meta-card {
      padding: 1rem 1.25rem;
      border-radius: .75rem;
      background: #fff;
      border: 1px solid #e3eaf4;
    }

    /* GALLERY */
    .gallery-card {
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0,0,0,.06);
      padding: 0.5rem;
      transition: .2s ease;
      height: 100%;
    }

    .gallery-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 26px rgba(0,0,0,.12);
    }

    .gallery-card img {
      width: 100%;
      border-radius: 10px;
      cursor: zoom-in;
      background: #f8f9fa;
    }

    .gallery-card figcaption {
      font-size: .9rem;
      color: #6c757d;
      padding: .75rem .5rem .25rem;
    }

    /* FEATURED FIRST IMAGE (full width) */
    .col-span-full {
      grid-column: 1 / -1;
    }

    /* LIGHTBOX */
    .modal-dark-bg {
      background: rgba(0,0,0,.95);
    }
  </style>
</head>

<body>

<nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
  <div class="container">
    <a class="navbar-brand" href="../index.html">Andrew Peters</a>
    <div class="ms-auto small">
      <a href="../index.html#projects" class="text-decoration-none">
        <i class="bi bi-arrow-left-short"></i> Back
      </a>
    </div>
  </div>
</nav>

<main class="container my-5">

<!-- HERO -->
<header class="project-hero p-4 p-md-5 mb-5">

  <div class="row g-4 align-items-center">

    <div class="col-lg-7">
      <h1 id="project-title" class="display-5 fw-semibold mb-3"></h1>
      <p id="project-description" class="lead mb-3"></p>

      <div id="project-tags" class="d-flex flex-wrap gap-2"></div>
    </div>

    <div class="col-lg-5 hero-media">
      <div id="hero-container"></div>
      <div id="hero-caption" class="hero-caption"></div>
    </div>

  </div>
</header>

<div class="project-body">

  <!-- SUMMARY -->
  <section id="summary" class="section-block">
    <h2 class="section-title">Summary</h2>

    <p id="summary-text"></p>

    <div class="row g-3 mt-3">
      <div class="col-md-4"><div class="meta-card"><div class="text-muted small">Time</div><div id="meta-time"></div></div></div>
      <div class="col-md-4"><div class="meta-card"><div class="text-muted small">Role</div><div id="meta-role"></div></div></div>
      <div class="col-md-4"><div class="meta-card"><div class="text-muted small">Deliverables</div><div id="meta-deliverable"></div></div></div>
    </div>
  </section>

  <!-- OBJECTIVE -->
  <section id="objective" class="section-block">
    <h2 class="section-title">Objective</h2>
    <p id="objective-text"></p>
  </section>

  <!-- LINKS -->
  <section id="links" class="section-block">
    <h2 class="section-title">Links</h2>
    <ul id="links-list"></ul>
  </section>

  <!-- GALLERY -->
  <section id="gallery" class="section-block">
    <h2 class="section-title">Gallery</h2>

    <div id="gallery-grid" class="row g-3"></div>
  </section>

  <!-- METHODS -->
  <section id="method" class="section-block">
    <h2 class="section-title">Methods</h2>
    <ol id="method-list"></ol>
  </section>

  <!-- SOURCES -->
  <section id="sources" class="section-block">
    <h2 class="section-title">Sources</h2>
    <ul id="sources-list"></ul>
  </section>

</div>
</main>

<!-- LIGHTBOX -->
<div class="modal fade" id="galleryModal">
  <div class="modal-dialog modal-dialog-centered modal-xl">
    <div class="modal-content modal-dark-bg border-0">
      <div class="modal-header border-0">
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center">
        <img class="img-fluid modal-img">
        <p class="text-light small mt-2 modal-caption"></p>
      </div>
    </div>
  </div>
</div>

<footer class="border-top py-4 small text-center">
  © <span id="year"></span> Andrew Peters
</footer>

<script src="../projects.js"></script>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

const id = new URLSearchParams(window.location.search).get("id");
const project = projects.find(p => p.id === id);

if (!project) throw new Error("Project not found");

/* HERO */
document.getElementById("project-title").textContent = project.title;
document.getElementById("project-description").textContent = project.description;

/* TAGS */
document.getElementById("project-tags").innerHTML =
  (project.tags || []).map(t => `<span class="badge text-bg-primary">${t}</span>`).join("");

/* HERO IMAGE OR MAP */
const hero = document.getElementById("hero-container");

if (project.hero?.type === "arcgis") {
  hero.innerHTML = `<arcgis-embedded-map item-id="${project.hero.itemId}" theme="light"></arcgis-embedded-map>`;
} else {
  hero.innerHTML = `<img src="../${project.hero.src}" alt="">`;
}

document.getElementById("hero-caption").textContent =
  project.hero?.caption || "";

/* SUMMARY */
document.getElementById("summary-text").textContent = project.summary || "";
document.getElementById("meta-time").textContent = project.time || "";
document.getElementById("meta-role").textContent = project.role || "";
document.getElementById("meta-deliverable").textContent = project.deliverable || "";

/* OBJECTIVE */
document.getElementById("objective-text").textContent = project.objective || "";

/* LINKS */
if (project.links || project.githubLink) {
  let html = "";

  (project.links || []).forEach(l =>
    html += `<li><a href="${l.url}" target="_blank">${l.label}</a></li>`
  );

  if (project.githubLink)
    html += `<li><a href="${project.githubLink}" target="_blank">GitHub</a></li>`;

  document.getElementById("links-list").innerHTML = html;
}

/* GALLERY (FIXED ODD IMAGE LOGIC) */
const grid = document.getElementById("gallery-grid");

if (project.gallery?.length) {

  const items = [...project.gallery];

  const isOdd = items.length % 2 === 1;

  grid.innerHTML = items.map((img, i) => {
    const full = isOdd && i === 0;

    return `
      <div class="col-12 col-md-6 ${full ? "col-span-full" : ""}">
        <figure class="gallery-card">
          <img src="../${img.src}" alt="${img.caption}">
          <figcaption>${img.caption}</figcaption>
        </figure>
      </div>
    `;
  }).join("");

  /* LIGHTBOX */
  const modal = new bootstrap.Modal(document.getElementById("galleryModal"));
  const modalImg = document.querySelector(".modal-img");
  const modalCap = document.querySelector(".modal-caption");

  document.querySelectorAll(".gallery-card img").forEach(img => {
    img.addEventListener("click", () => {
      modalImg.src = img.src;
      modalCap.textContent = img.alt;
      modal.show();
    });
  });
}

/* METHODS */
if (project.method?.length) {
  document.getElementById("method-list").innerHTML =
    project.method.map(m => `<li>${m}</li>`).join("");
}

/* SOURCES */
if (project.sources?.length) {
  document.getElementById("sources-list").innerHTML =
    project.sources.map(s => `<li>${s}</li>`).join("");
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
